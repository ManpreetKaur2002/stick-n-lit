<!DOCTYPE html>

<head>

    <meta charset="UTF-8">

<body>

    <div class="layout">

        <aside class="sidebar">

            <h2>Stick N Lit</h2>

            <nav>

                <a class="active" href="index.html">🏠 Dashboard</a>

                <a href="orders.html">📦 Orders</a>

                <a href="failed-orders.html">⚠️ Failed Orders</a>

        <main>

            <div class="page-header">

                <div>

                    <h1>Dashboard</h1>

                </div>

            </div>

                    </div>

                    <div class="card stat-card">
                        <h3>Total Revenue</h3>

                    </div>

                    <div class="card stat-card">
                        <h3>Pending Orders</h3>
                        <h1 id="pendingOrders">0</h1>
                    </div>

                    <div class="card stat-card">
                        <h3>Failed Payments</h3>
                        <h1 id="failedPayments">0</h1>
                    </div>

                </div>

            </section>
            <section class="recent-orders">

                <div class="section-header">

                    <h2>Recent Orders</h2>

                    </a>

                </div>

                <div class="table-wrapper">

                    <table>

                    </table>

            </section>
            <div class="table-wrapper">

                <table>

                    <thead>

                        <tr>

                            <th>Order</th>

                            <th>Customer</th>

                            <th>Amount</th>

                            <th>Status</th>

                    </tbody>
